<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nudibranch! Where Are you? - Pacific Northwest tidepool planner</title>

  <!-- Leaflet for the map (CDN). All other assets and data are local/static. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Relative paths so the site works at a domain root or a Pages subpath. -->
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <header>
    <div class="banner-art" aria-hidden="true">
      <img src="static/img/drawn/flabellinopsis_iodinea.png" alt="">
      <img src="static/img/drawn/dendronotus_venustus.png" alt="">
      <img src="static/img/drawn/acanthodoris_rhodoceras.png" alt="">
      <img src="static/img/drawn/doto_columbiana.png" alt="">
      <img src="static/img/drawn/cerberilla_mosslandica.png" alt="">
      <img src="static/img/drawn/onchidoris_bilamellata.png" alt="">
      <img src="static/img/drawn/tenellia_columbiana.png" alt="">
      <img src="static/img/drawn/flabellinopsis_iodinea.png" alt="">
      <img src="static/img/drawn/dendronotus_venustus.png" alt="">
      <img src="static/img/drawn/doto_columbiana.png" alt="">
    </div>
    <img class="corner-logo" src="static/img/drawn/diaulula_odonoghuei.png" alt="A drawn nudibranch (Diaulula odonoghuei)">
    <div class="brand">
      <h1>Nudibranch! <span class="brand-sub">Where Are you?</span></h1>
    </div>
    <form id="controls">
      <label>Area
        <select id="region" name="region"></select>
      </label>
      <label>Date
        <input type="date" id="date" name="date">
      </label>
      <button type="submit">Plan</button>
      <div class="viewtoggle" role="group" aria-label="Map view mode">
        <button type="button" class="vt active" data-view="slug">Slug view</button>
        <button type="button" class="vt" data-view="tide">Tide view</button>
      </div>
    </form>
    <div id="tide-scrubber" hidden>
      <label class="hour-toggle"><input type="checkbox" id="tide-hour-enable"> Filter to one hour</label>
      <span id="tide-slider-group" class="disabled">
        <label for="tide-time">at <strong id="tide-time-label">-</strong></label>
        <input type="range" id="tide-time" min="0" max="1439" step="5" value="720" disabled>
      </span>
      <span id="tide-scrubber-note"></span>
    </div>
    <p class="hint">Showing daylight low tides between 08:00 and 20:00.</p>
  </header>

  <main>
    <div id="map"></div>
    <aside id="sidebar">
      <div id="summary"></div>
      <ul id="beach-list"></ul>
    </aside>
  </main>

  <footer>
    <span id="data-note"></span>
    Tides via <a href="https://tidesandcurrents.noaa.gov/">NOAA CO-OPS</a> ·
    Sightings via <a href="https://www.inaturalist.org/">iNaturalist</a>.
  </footer>

  <script src="static/app.js"></script>
</body>
</html>
